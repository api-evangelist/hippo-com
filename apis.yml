aid: hippo-com
name: Hippo
description: >-
  Hippo is a US homeowners insurance carrier headquartered in Palo Alto,
  California, operating as the insurance subsidiary of Hippo Holdings Inc.
  (NYSE: HIPO). Founded in 2015, Hippo modernizes home insurance with
  instant online quotes — typically under sixty seconds — and a smart home
  oriented approach that pairs policies with proactive home maintenance
  guidance through the Hippo Home mobile app, DIY checklists, home health
  scoring, and partnerships with smart device makers. The company writes
  homeowners, condo, landlord, flood, auto, and pet policies and operates
  as both a direct-to-consumer brand and an MGA distributing through a
  network of 70+ carrier partners, including Bamboo, Stillwater,
  Nationwide, American Integrity, Liberty Mutual, and Progressive. Hippo's
  underwriting capacity is anchored by its wholly-owned admitted carrier,
  Spinnaker Insurance Company, acquired in 2020. Hippo serves 500K+
  homeowners across the United States, with concentrated presence in
  Texas, California, Arizona, Colorado, Missouri, Ohio, South Carolina,
  Tennessee, and Virginia. There is no publicly documented developer API,
  SDK, or open-source release for Hippo or Spinnaker; the GitHub
  organization hippoinsurance exists but has no public repositories, and
  the api.hippo.com hostname is not exposed to the public internet.
  Integrations with smart home device partners, agents, and MGA carriers
  are handled through private partner channels rather than an open
  developer program.
